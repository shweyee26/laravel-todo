name: Deploy to Lightsail Ubuntu

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Basic Test (Laravel check)
        run: |
          echo "===== TEST START ====="
          php -v || true
          composer --version || true
          echo "===== TEST DONE ====="

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}

          script: |
            echo "===== DEPLOY START ====="

            # =========================
            # 1. Install packages
            # =========================
            sudo apt update -y

            sudo DEBIAN_FRONTEND=noninteractive apt install -y \
              git apache2 \
              php php-cli php-mbstring php-xml php-bcmath php-curl php-mysql \
              php-zip php-gd php-intl unzip curl \
              nodejs npm

            # =========================
            # MYSQL INSTALL
            # =========================
            sudo apt install -y mysql-server

            sudo systemctl enable mysql
            sudo systemctl start mysql

            sudo mysql -e "CREATE DATABASE IF NOT EXISTS laravel;"

            sudo mysql -e "
            CREATE USER IF NOT EXISTS 'user'@'localhost'
            IDENTIFIED WITH mysql_native_password BY 'userpassword';
            "

            sudo mysql -e "
            GRANT ALL PRIVILEGES ON laravel.* TO 'user'@'localhost';
            FLUSH PRIVILEGES;
            "

            # =========================
            # Composer
            # =========================
            if ! command -v composer >/dev/null 2>&1; then
              curl -sS https://getcomposer.org/installer | php
              sudo mv composer.phar /usr/local/bin/composer
            fi

            sudo systemctl enable apache2
            sudo systemctl start apache2

            # =========================
            # Clone / Update
            # =========================
            sudo mkdir -p /var/www

            if [ ! -d "/var/www/laravel-todo" ]; then
              cd /var/www
              sudo git clone https://github.com/devktops/laravel-todo.git
            else
              cd /var/www/laravel-todo
              sudo git fetch origin
              sudo git checkout master || sudo git checkout -b master origin/master
              sudo git reset --hard origin/master
            fi

            cd /var/www/laravel-todo

            # =========================
            # ENV
            # =========================
            sudo touch .env
            echo "${{ secrets.ENV_FILE }}" | sudo tee .env > /dev/null

            # =========================
            # Backend
            # =========================
            sudo composer install --no-dev --optimize-autoloader --no-interaction

            # =========================
            # Frontend
            # =========================
            sudo chown -R ubuntu:ubuntu /var/www/laravel-todo

            npm install
            npm run build

            sudo chown -R www-data:www-data /var/www/laravel-todo

            # =========================
            # Laravel
            # =========================
            php artisan key:generate --force
            php artisan optimize:clear
            php artisan migrate --force

            # =========================
            # Permissions
            # =========================
            sudo chown -R www-data:www-data /var/www/laravel-todo
            sudo chmod -R 775 storage bootstrap/cache

            # =========================
            # Apache
            # =========================
            sudo tee /etc/apache2/sites-available/000-default.conf > /dev/null << 'EOF'
            <VirtualHost *:80>
                ServerAdmin webmaster@localhost
                DocumentRoot /var/www/laravel-todo/public

                <Directory /var/www/laravel-todo/public>
                    AllowOverride All
                    Require all granted
                </Directory>

                ErrorLog ${APACHE_LOG_DIR}/error.log
                CustomLog ${APACHE_LOG_DIR}/access.log combined
            </VirtualHost>
            EOF


            sudo a2enmod rewrite
            sudo systemctl restart apache2

            echo "===== DEPLOY DONE ====="