name: Deploy to Lightsail Ubuntu

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          echo "===== DEPLOY START ====="
          sudo apt update -y
          sudo apt install -y git
          sudo mkdir -p /var/www
          cd /var/www
          if [ ! -d "laravel-todo" ]; then
              sudo git clone https://github.com/devktops/laravel-todo.git
          else
              cd laravel-todo
              sudo git pull origin main
              cd ..
          fi
          echo "${{ secrets.ENV_FILE }}" | sudo tee .env > /dev/null
          sudo composer install --no-dev --optimize-autoloader --no-interaction
          sudo php artisan key:generate --force
          sudo php artisan migrate --force
          sudo chown -R www-data:www-data storage bootstrap/cache
          sudo chmod -R 775 storage bootstrap/cache
          echo "===== FILES AFTER DEPLOY ====="
          ls -la /var/www/laravel-todo