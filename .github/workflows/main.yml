name: Deploy to Lightsail Ubuntu

on:
  push:
    branches:
      - main

# =========================
# 1. TEST PIPELINE
# =========================
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: PHP Check
        run: |
          php -v
          composer --version


# =========================
# 2. BUILD PIPELINE (FAST CI BUILD)
# =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build Assets
        run: |
          npm install
          npm run build

      - name: Archive Build Files
        run: |
          tar -czf build.tar.gz public/ bootstrap/ storage/ vendor/ composer.lock .env.example || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-build
          path: build.tar.gz


# =========================
# 3. DEPLOY PIPELINE (LIGHTWEIGHT)
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-build

      - name: Deploy via SSH (FAST UPDATE ONLY)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}

          script: |
            echo "===== DEPLOY START (FAST MODE) ====="

            cd /var/www/laravel-todo

            # Pull latest code only
            sudo git fetch origin
            sudo git reset --hard origin/main

            # Install dependencies only (no OS install!)
            composer install --no-dev --optimize-autoloader --no-interaction

            # Laravel optimize
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache

            # Migrate safely
            php artisan migrate --force

            # Permissions only
            sudo chown -R www-data:www-data /var/www/laravel-todo
            sudo chmod -R 775 storage bootstrap/cache

            sudo systemctl restart apache2

            echo "===== DEPLOY DONE ====="