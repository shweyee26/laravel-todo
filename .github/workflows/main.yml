name: Deploy to Lightsail Ubuntu

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          sudo DEBIAN_FRONTEND=noninteractive apt update -y
          sudo DEBIAN_FRONTEND=noninteractive apt install -y git apache2
          
          sudo systemctl enable apache2
          sudo systemctl start apache2

          sudo mkdir -p /var/www
          cd /var/www
          if [ ! -d "laravel-todo" ]; then
              sudo git clone https://github.com/devktops/laravel-todo.git
          else
              cd laravel-todo
              sudo git pull origin main
          fi

          cd /var/www/laravel-todo
          
          echo "${{ secrets.ENV_FILE }}" | sudo tee .env > /dev/null
          
          sudo composer install --no-dev --optimize-autoloader --no-interaction
          sudo php artisan key:generate --force
          sudo php artisan migrate --force

          echo "===== SETTING PERMISSIONS ====="
          sudo chown -R www-data:www-data /var/www/laravel-todo
          sudo chmod -R 775 /var/www/laravel-todo/storage
          sudo chmod -R 775 /var/www/laravel-todo/bootstrap/cache

          sudo sed -i 's|DocumentRoot /var/www/html|DocumentRoot /var/www/laravel-todo/public|g' /etc/apache2/sites-available/000-default.conf
          
          if ! grep -q "<Directory /var/www/laravel-todo/public>" /etc/apache2/sites-available/000-default.conf; then
            sudo sed -i '/<\/VirtualHost>/i \
            <Directory /var/www/laravel-todo/public>\n    Options Indexes FollowSymLinks\n    AllowOverride All\n    Require all granted\n</Directory>' /etc/apache2/sites-available/000-default.conf
          fi

          sudo a2enmod rewrite
          sudo systemctl restart apache2

          ls -la /var/www/laravel-todo