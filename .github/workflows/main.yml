name: Deploy to Lightsail Ubuntu

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Basic Test
        run: |
          echo "===== TEST START ====="
          php -v || true
          composer --version || true
          echo "===== TEST DONE ====="

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}

          script: |
            echo "===== DEPLOY START ====="

            # =========================
            # 1. SYSTEM PACKAGES
            # =========================
            sudo apt update -y
            sudo DEBIAN_FRONTEND=noninteractive apt install -y \
              git apache2 \
              php php-cli php-mbstring php-xml php-bcmath php-curl php-mysql \
              php-zip php-gd php-intl unzip curl \
              nodejs npm

            # =========================
            # 2. APACHE ENABLE
            # =========================
            sudo systemctl enable apache2
            sudo systemctl start apache2

            # =========================
            # 3. MYSQL (RUN ONLY ONCE - SAFE GUARD)
            # =========================
            if ! systemctl is-active --quiet mysql; then
              sudo apt install -y mysql-server
              sudo systemctl enable mysql
              sudo systemctl start mysql

              sudo mysql -e "CREATE DATABASE IF NOT EXISTS laravel;"
              sudo mysql -e "CREATE USER IF NOT EXISTS 'user'@'localhost' IDENTIFIED BY 'userpassword';"
              sudo mysql -e "GRANT ALL PRIVILEGES ON laravel.* TO 'user'@'localhost'; FLUSH PRIVILEGES;"
            fi

            # =========================
            # 4. COMPOSER
            # =========================
            if ! command -v composer >/dev/null 2>&1; then
              curl -sS https://getcomposer.org/installer | php
              sudo mv composer.phar /usr/local/bin/composer
            fi

            # =========================
            # 5. CLONE / UPDATE CODE
            # =========================
            sudo mkdir -p /var/www

            if [ ! -d "/var/www/laravel-todo" ]; then
              cd /var/www
              sudo git clone https://github.com/shweyee26/laravel-todo.git
            else
              cd /var/www/laravel-todo
              sudo git reset --hard
              sudo git pull origin main
            fi

            cd /var/www/laravel-todo

            # =========================
            # 6. ENV FILE (SAFE)
            # =========================
            sudo rm -f .env
            echo "${{ secrets.ENV_FILE }}" | sudo tee .env > /dev/null

            # =========================
            # 7. FIX PERMISSIONS BEFORE LARAVEL
            # =========================
            sudo chown -R www-data:www-data /var/www/laravel-todo
            sudo chmod -R 775 storage bootstrap/cache

            # =========================
            # 8. COMPOSER INSTALL
            # =========================
            composer install --no-dev --optimize-autoloader --no-interaction

            # =========================
            # 9. LARAVEL SETUP (ORDER FIXED)
            # =========================
            php artisan optimize:clear
            php artisan key:generate --force
            php artisan migrate --force

            # =========================
            # 10. FRONTEND BUILD
            # =========================
            npm install
            npm run build

            # =========================
            # 11. CACHE OPTIMIZE (PRODUCTION)
            # =========================
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # =========================
            # 12. FINAL PERMISSIONS
            # =========================
            sudo chown -R www-data:www-data /var/www/laravel-todo
            sudo chmod -R 775 storage bootstrap/cache

            # =========================
            # 13. APACHE CONFIG
            # =========================
            sudo tee /etc/apache2/sites-available/000-default.conf > /dev/null << 'EOF'
            <VirtualHost *:80>
                ServerAdmin webmaster@localhost
                DocumentRoot /var/www/laravel-todo/public

                <Directory /var/www/laravel-todo/public>
                    AllowOverride All
                    Require all granted
                </Directory>

                ErrorLog ${APACHE_LOG_DIR}/error.log
                CustomLog ${APACHE_LOG_DIR}/access.log combined
            </VirtualHost>
            EOF

            sudo a2enmod rewrite
            sudo systemctl restart apache2

            echo "===== DEPLOY DONE ====="